<html>
  <head>
    <title>Student Information Form</title>
  </head>
  <body>
    <h2>Student Information Form</h2>
    <form>
      <label>Enter your Name:</label>
      <input type="text" name="TxtName"><br>
      <label>Enter your USN:</label>
      <input type="text" name="TxtUSN"><br>
      <label>Enter your email Id:</label>
      <input type="text" name="Txtemail"><br>
      <label>Enter your Phonenumber:</label>
      <input type="number" name="num"><br>
      <label>Enter gender:</label>
      <input type="radio" name="rdgender" value="male">Male<br>
      <input type="radio" name="rdgender" value="Female">Female<br>
      <label>Enter your Address</label>
      <textarea name="address" rows="4" cols="30"></textarea><br>
      <button type="submit">Submit</button>
     </form>
  </body>   
</html>
